name: Android Build

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'fix/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --parallel --continue

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

      - name: Run lint
        run: ./gradlew lintDebug --no-daemon

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

      - name: Assemble debug APK
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ github.run_number }}
        run: ./gradlew assembleDebug --no-daemon --parallel

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/SumRead.apk

      - name: Publish latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: latest
          name: "SumRead"
          prerelease: false
          make_latest: true
          body: |
            ## SumRead

            > Automated build from `main` — commit `${{ github.sha }}`

            Every push to `main` overwrites this release with the latest APK.

            ### Installation
            1. Download `SumRead.apk` below.
            2. On Android: **Settings → Apps → Special app access → Install unknown apps** — allow your browser or file manager.
            3. Open the APK to install.

            ### Requirements
            - Android 8.0 (API 26) or higher
            - For AI features: your own API key for Groq, Gemini, or OpenAI

            ### Privacy
            OCR and TTS run entirely on-device. AI features only activate when you explicitly provide an API key and trigger them.
          files: app/build/outputs/apk/debug/SumRead.apk

      - name: Set repository metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo edit \
            --description "📖 Privacy-first Android overlay — capture screen text, read aloud or ask AI (Groq, Gemini, OpenAI). OCR & TTS run fully on-device." \
            --homepage "https://github.com/${{ github.repository }}/releases/latest" \
            --add-topic android \
            --add-topic kotlin \
            --add-topic accessibility \
            --add-topic ocr \
            --add-topic ai \
            --add-topic overlay \
            --add-topic jetpack-compose \
            --add-topic text-to-speech \
            --add-topic summarization \
            --add-topic privacy || true
