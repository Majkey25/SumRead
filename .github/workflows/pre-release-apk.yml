name: Pre-Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 0.2.0-beta1)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        env:
          VERSION_NAME: ${{ github.event.inputs.version_name || 'dev' }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew assembleDebug --no-daemon --parallel

      - name: Rename APK
        run: |
          VERSION=${{ github.event.inputs.version_name || 'dev' }}
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/SumRead-${VERSION}-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sumread-pre-release-apk
          path: app/build/outputs/apk/debug/SumRead-*.apk
          retention-days: 30
